<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GoFood</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #FF5252; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #FF5252;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #ff3b3b; }
        button:disabled { background-color: #ccc; }
        #message { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
        .error { background-color: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="card">
        <h1>GoFood</h1>
        <p>Enter your new password below</p>

        <div id="form-container">
            <div class="input-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="At least 6 characters">
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat new password">
            </div>
            <button id="reset-btn" onclick="resetPassword()">Reset Password</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('reset-btn');

            if (!token) {
                showMessage('Invalid or missing token', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerText = 'Resetting...';

                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    showMessage('Password reset successful! You can now log in from the app.', 'success');
                } else {
                    showMessage(data.error || 'Failed to reset password', 'error');
                }
            } catch (err) {
                showMessage('An error occurred. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        }

        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.innerText = msg;
            div.className = type;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
