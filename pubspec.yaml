name: gofood
description: "A professional food delivery app built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.0

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI & Images
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.0
  carousel_slider: ^5.0.0

  # Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/